<!-- Import the Sling Model -->
<sly data-sly-use.model="com.krishhanvimart.core.models.CategoryCardsModel"></sly>

<!-- Main container for all category cards -->
<section class="category-cards-container">

    <!-- Iterate through each CategoryItem returned by the Sling Model -->
    <article class="category-card-item"
             data-sly-list.item="${model.categoryItems}">

        <!-- Category Image -->
        <img src="${item.image}"
             alt="${item.title}"
             loading="lazy"/>

        <!-- Category Title -->
        <h2>${item.title}</h2>

        <!-- Category Description -->
        <p>${item.description}</p>

        <!-- Display button only if both text and link are authored -->
        <a data-sly-test="${item.buttonText && item.buttonLink}"
           href="${item.buttonLink}.html">
            ${item.buttonText}
        </a>

    </article>

</section>

<!-- Display placeholder in Author mode when no categories are configured -->
<sly data-sly-use.templates="core/wcm/components/commons/v1/templates.html"
     data-sly-call="${templates.placeholder @ isEmpty=model.categoryItems.size == 0}">
</sly>
