<div class="hero-banner">
    <!-- banner image-->
    <img src="${properties.image}"
         alt="${properties.heading}">
    <!-- Heading -->
    <h1>Heading : "${properties.heading}"</h1>
    <!--descritption-->
    <p>Description : ${properties.description}</p>
    <!-- Call To Action -->
    <a href="${properties.buttonLink @ context='uri'}.html"
       target="_blank"
    rel="noopener noopener">
        ${properties.buttonText}
    </a>

</div>
